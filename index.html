<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hameed Tools Hub</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:linear-gradient(135deg,#0f172a,#020617);
color:white;
}

/* HEADER */

header{
text-align:center;
padding:25px;
font-size:30px;
font-weight:bold;
background:linear-gradient(90deg,#38bdf8,#9333ea);
}

/* SEARCH */

.search{
text-align:center;
margin:20px;
}

.search input{
width:85%;
max-width:400px;
padding:12px;
border-radius:25px;
border:none;
outline:none;
}

/* GRID */

.container{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
padding:20px;
}

/* CARD */

.card{
background:#1e293b;
border-radius:12px;
padding:20px;
text-align:center;
transition:.3s;
}

.card:hover{
transform:translateY(-8px);
box-shadow:0 0 20px #38bdf8;
}

.card h3{
margin-bottom:10px;
}

.card p{
font-size:14px;
color:#cbd5f5;
}

.card button{
margin-top:10px;
padding:8px 16px;
border:none;
border-radius:20px;
background:linear-gradient(90deg,#38bdf8,#9333ea);
color:white;
cursor:pointer;
}

/* DELETE BTN */

.deleteBtn{
background:red;
margin-left:5px;
}

/* ADMIN PANEL */

.adminPanel{
display:none;
background:#020617;
margin:20px;
padding:20px;
border-radius:10px;
}

.adminPanel input{
width:100%;
padding:10px;
margin:6px 0;
border:none;
border-radius:6px;
}

.adminPanel button{
padding:10px 15px;
border:none;
border-radius:6px;
background:#38bdf8;
cursor:pointer;
}

/* FOOTER */

footer{
text-align:center;
padding:20px;
background:#020617;
}

.adminBtn{
margin-top:10px;
background:#9333ea;
padding:8px 15px;
border:none;
border-radius:10px;
color:white;
cursor:pointer;
}

</style>
</head>

<body>

<header>
🚀 Hameed Tools Hub
</header>

<div class="search">
<input type="text" id="search" placeholder="Search tools..." onkeyup="searchTools()">
</div>

<div class="container" id="tools"></div>

<!-- ADMIN PANEL -->

<div class="adminPanel" id="adminPanel">

<h2>Add Tool</h2>

<input id="toolName" placeholder="Tool Name">

<input id="toolDesc" placeholder="Description">

<input id="toolLink" placeholder="Tool Link">

<button onclick="addTool()">Add Tool</button>

</div>

<footer>

© 2026 Hameed Ullah

<br><br>

<button class="adminBtn" onclick="adminLogin()">Admin Panel</button>

</footer>

<script>

let container=document.getElementById("tools")

loadTools()

function adminLogin(){

let pass=prompt("Enter Admin Password")

if(pass==="admin123"){

document.getElementById("adminPanel").style.display="block"

}else{

alert("Wrong Password")

}

}

/* ADD TOOL */

function addTool(){

let name=document.getElementById("toolName").value
let desc=document.getElementById("toolDesc").value
let link=document.getElementById("toolLink").value

let tools=JSON.parse(localStorage.getItem("tools")) || []

let tool={name,desc,link}

tools.push(tool)

localStorage.setItem("tools",JSON.stringify(tools))

displayTool(tool,tools.length-1)

}

/* DISPLAY TOOL */

function displayTool(tool,index){

let card=document.createElement("div")

card.className="card"

card.innerHTML=`

<h3>${tool.name}</h3>

<p>${tool.desc}</p>

<button onclick="window.open('${tool.link}')">Open</button>

<button class="deleteBtn" onclick="deleteTool(${index})">Delete</button>

`

container.appendChild(card)

}

/* LOAD TOOLS */

function loadTools(){

let tools=JSON.parse(localStorage.getItem("tools")) || []

container.innerHTML=""

tools.forEach((tool,index)=>{

displayTool(tool,index)

})

}

/* DELETE TOOL */

function deleteTool(index){

let tools=JSON.parse(localStorage.getItem("tools"))

tools.splice(index,1)

localStorage.setItem("tools",JSON.stringify(tools))

loadTools()

}

/* SEARCH */

function searchTools(){

let input=document.getElementById("search").value.toLowerCase()

let cards=document.querySelectorAll(".card")

cards.forEach(card=>{

let text=card.innerText.toLowerCase()

card.style.display=text.includes(input) ? "block" : "none"

})

}

</script>

</body>
</html>
